spring.application.name=usuarios

server.address=0.0.0.0
server.port=${SERVER_PORT:9090}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/usuarios_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}

auth.internal-api-key=${INTERNAL_API_KEY:internal-service-key-parcial2}
auth.jwt.secret=${JWT_SECRET:parcial2-arqui-jwt-secret-key-2026-min-256-bits!!}
auth.jwt.expiration-ms=${JWT_EXPIRATION_MS:600000}

