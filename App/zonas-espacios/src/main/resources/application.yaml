spring:
  application:
    name: zonas-espacios
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3307/zonas_espacios?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:zonas_app}
    password: ${SPRING_DATASOURCE_PASSWORD:zonas123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081
  address: 0.0.0.0

auth:
  jwt:
    secret: ${JWT_SECRET:parcial2-arqui-jwt-secret-key-2026-min-256-bits!!}
  internal-api-key: ${INTERNAL_API_KEY:internal-service-key-parcial2}
