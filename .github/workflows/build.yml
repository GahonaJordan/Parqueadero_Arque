name: SonarCloud

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test
      - development
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - test
      - development

jobs:
  sonar:
    name: Build and analyze ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: tickets
            path: tickets
          - service: usuarios
            path: usuarios
          - service: vehiculo
            path: vehiculo
          - service: zonas-espacios
            path: zonas-espacios

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Grant execute permission to Maven wrapper
        run: chmod +x ${{ matrix.path }}/mvnw

      - name: Build and analyze ${{ matrix.service }}
        working-directory: ${{ matrix.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.projectKey=${{ matrix.sonarKey || matrix.service }} \
            -Dsonar.projectName=${{ matrix.service }} \
            -Dsonar.organization=gahonajordan \
            -Dsonar.login=$SONAR_TOKEN

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: sonar
    if: always()

    steps:
      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SONAR_RESULT: ${{ needs.sonar.result }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          if [ "$SONAR_RESULT" = "success" ]; then
            MSG="Build and SonarCloud analysis successful for ${GITHUB_REPOSITORY} on ${GITHUB_REF}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          else
            MSG="Build or SonarCloud analysis failed for ${GITHUB_REPOSITORY} on ${GITHUB_REF}. Check logs: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="$MSG"
