name: SonarCloud

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - test
      - development
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - test
      - development

jobs:
  sonar:
    name: Build and analyze ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: tickets
            path: App/tickets
          - service: usuarios
            path: App/usuarios
          - service: vehiculo
            path: App/vehiculo
          - service: zonas-espacios
            path: App/zonas-espacios
          - service: ms-audit
            path: App/ms-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Grant execute permission to Maven wrapper
        run: chmod +x ${{ matrix.path }}/mvnw

      - name: Build and analyze ${{ matrix.service }}
        working-directory: ${{ matrix.path }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -f "./mvnw" ]; then
            chmod +x ./mvnw
            MVN="./mvnw"
          else
            MVN="mvn"
          fi

          $MVN -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -DskipTests \
            -Dsonar.projectKey=${{ matrix.service }} \
            -Dsonar.projectName=${{ matrix.service }} \
            -Dsonar.organization=gahonajordan \
            -Dsonar.login=$SONAR_TOKEN

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: sonar
    if: always()
    permissions:
      actions: read
      contents: read

    steps:
      - name: Build and send report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_RESULT: ${{ needs.sonar.result }}
        run: |
          set -e

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not configured. Skipping notification."
            exit 0
          fi

          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"
          AUTHOR="${GITHUB_ACTOR}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          EVENT="${GITHUB_EVENT_NAME}"

          if [ "$SONAR_RESULT" = "success" ]; then
            HEADER="✅ *Pipeline exitoso*"
          elif [ "$SONAR_RESULT" = "cancelled" ]; then
            HEADER="⚠️ *Pipeline cancelado*"
          else
            HEADER="❌ *Pipeline con errores*"
          fi

          # Consultar el detalle de cada job del matrix vía API de GitHub
          JOBS_JSON=$(curl -s \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs?per_page=100")

          SERVICES_REPORT=$(echo "$JOBS_JSON" | jq -r '
            .jobs[]
            | select(.name | startswith("Build and analyze "))
            | .name as $n
            | (if .conclusion == "success" then "✅"
               elif .conclusion == "failure" then "❌"
               elif .conclusion == "cancelled" then "⚠️"
               elif .conclusion == "skipped" then "⏭️"
               else "❔" end) as $icon
            | "\($icon) \($n | sub("Build and analyze "; ""))"
          ')

          if [ -z "$SERVICES_REPORT" ]; then
            SERVICES_REPORT="(no se pudo obtener el detalle por servicio)"
          fi

          MSG=$(printf '%s\n\n📦 *Repositorio:* %s\n🌿 *Rama:* %s\n👤 *Autor:* %s\n📝 *Commit:* %s\n🔀 *Evento:* %s\n\n*Resultado por microservicio:*\n%s\n\n🔗 [Ver ejecución completa](%s)' \
            "$HEADER" "$REPO" "$BRANCH" "$AUTHOR" "$COMMIT_MSG" "$EVENT" "$SERVICES_REPORT" "$RUN_URL")

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=${MSG}"
